<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <title th:text="${title}">管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
        }
        .sidebar a {
            color: #fff;
            text-decoration: none;
            padding: 10px 15px;
            display: block;
        }
        .sidebar a:hover, .sidebar a.active {
            background-color: #495057;
        }
        .main-content {
            padding: 20px;
        }
        .alert {
            margin-bottom: 20px;
        }
        .card {
            margin-bottom: 20px;
        }
        .table-actions {
            white-space: nowrap;
        }
        .btn-sm {
            margin-right: 5px;
        }
        .nav-section {
            padding: 10px 15px;
            color: #adb5bd;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-2 sidebar">
                <div class="p-3 text-white">
                    <h4>专业管理系统</h4>
                </div>
                <div class="nav-section">基础管理</div>
                <a th:href="@{/}">首页</a>
                <a th:href="@{/slot/list}">栏位管理</a>
                <a th:href="@{/menu-tree/list}">菜单树管理</a>
                <a th:href="@{/menu/list}">菜单管理</a>
                <a th:href="@{/page/list}">页面管理</a>
                <a th:href="@{/component/list}">组件管理</a>
                <div class="nav-section">关联配置</div>
                <a th:href="@{/slot-config/menu-tree}">栏位菜单树配置</a>
                <a th:href="@{/slot-config/page}">栏位页面配置</a>
                <div class="nav-section">发布管理</div>
                <a th:href="@{/publish}">数据发布</a>
            </div>
            <div class="col-md-10 main-content">
                <th:block layout:fragment="content">
                </th:block>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
