<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('栏位管理 - 专业管理系统')"></head>
<body>
    <div th:replace="layout :: sidebar('slot')"></div>
    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2>栏位管理</h2>
            <a th:href="@{/slot/add}" class="btn btn-primary">新增栏位</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}">操作成功</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}">操作失败</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>栏位号</th>
                            <th>栏位名称</th>
                            <th>描述</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="slot : ${slots}">
                            <td th:text="${slot.id}">1</td>
                            <td th:text="${slot.slotCode}">SLOT001</td>
                            <td th:text="${slot.slotName}">顶部栏位</td>
                            <td th:text="${slot.description}">描述</td>
                            <td>
                                <span th:if="${slot.status == 1}" class="badge bg-success">启用</span>
                                <span th:if="${slot.status != 1}" class="badge bg-secondary">禁用</span>
                            </td>
                            <td th:text="${#temporals.format(slot.createTime, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</td>
                            <td class="table-actions">
                                <a th:href="@{/slot/edit/{id}(id=${slot.id})}" class="btn btn-sm btn-primary">编辑</a>
                                <a th:href="@{/slot-config/menu-tree}" class="btn btn-sm btn-info">菜单树配置</a>
                                <a th:href="@{/slot-config/page}" class="btn btn-sm btn-warning">页面配置</a>
                                <a th:href="@{/slot/delete/{id}(id=${slot.id})}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('确定要删除此栏位吗？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:if="${#lists.isEmpty(slots)}" class="text-center text-muted py-4">
                    暂无数据
                </div>
            </div>
        </div>
    </div>
</body>
</html>
