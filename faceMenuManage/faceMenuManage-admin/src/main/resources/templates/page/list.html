<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('页面管理 - 专业管理系统')"></head>
<body>
    <div th:replace="layout :: sidebar('page')"></div>
    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2>页面管理</h2>
            <a th:href="@{/page/add}" class="btn btn-primary">新增页面</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}">操作成功</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}">操作失败</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>页面编码</th>
                            <th>页面名称</th>
                            <th>路由路径</th>
                            <th>描述</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="page : ${pages}">
                            <td th:text="${page.id}">1</td>
                            <td th:text="${page.pageCode}">PAGE001</td>
                            <td th:text="${page.pageName}">首页</td>
                            <td th:text="${page.routePath}">/home</td>
                            <td th:text="${page.description}">描述</td>
                            <td>
                                <span th:if="${page.status == 1}" class="badge bg-success">启用</span>
                                <span th:if="${page.status != 1}" class="badge bg-secondary">禁用</span>
                            </td>
                            <td th:text="${#temporals.format(page.createTime, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</td>
                            <td class="table-actions">
                                <a th:href="@{/page/edit/{id}(id=${page.id})}" class="btn btn-sm btn-primary">编辑</a>
                                <a th:href="@{/page-config/component/{pageId}(pageId=${page.id})}" class="btn btn-sm btn-info">组件配置</a>
                                <a th:href="@{/page/delete/{id}(id=${page.id})}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('确定要删除此页面吗？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:if="${#lists.isEmpty(pages)}" class="text-center text-muted py-4">
                    暂无数据
                </div>
            </div>
        </div>
    </div>
</body>
</html>
