<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>组件管理 - 菜单管理系统</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
            <h1 class="h2">组件管理</h1>
            <div class="btn-toolbar mb-2 mb-md-0">
                <a th:href="@{/component/add}" class="btn btn-sm btn-primary">新增组件</a>
            </div>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}">操作成功</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">">
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}">操作失败</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close">">
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-striped table-hover">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>组件编码</th>
                            <th>组件名称</th>
                            <th>组件类型</th>
                            <th>描述</th>
                            <th>状态</th>
                            <th>创建时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="component : ${components}">
                            <td th:text="${component.id}">1</td>
                            <td th:text="${component.componentCode}">COMP001</td>
                            <td th:text="${component.componentName}">顶部导航栏</td>
                            <td th:text="${component.componentType}">Header</td>
                            <td th:text="${component.description}">描述</td>
                            <td>
                                <span th:if="${component.status == 1}" class="badge bg-success">启用</span>
                                <span th:if="${component.status != 1}" class="badge bg-secondary">禁用</span>
                            </td>
                            <td th:text="${#temporals.format(component.createTime, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</td>
                            <td class="table-actions">
                                <a th:href="@{/component/edit/{id}(id=${component.id})}" class="btn btn-sm btn-primary">编辑</a>
                                <a th:href="@{/component/delete/{id}(id=${component.id})}" class="btn btn-sm btn-danger"
                                   onclick="return confirm('确定要删除此组件吗？')">删除</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div th:if="${#lists.isEmpty(components)}" class="text-center text-muted py-4">
                    暂无数据
                </div>
            </div>
        </div>
    </div>
</body>
</html>
