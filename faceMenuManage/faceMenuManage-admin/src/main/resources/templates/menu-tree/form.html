<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head(${menuTree.id == null} ? '新增菜单树 - 专业管理系统' : '编辑菜单树 - 专业管理系统')"></head>
<body>
    <div th:replace="layout :: sidebar('menuTree')"></div>
    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2 th:text="${menuTree.id == null} ? '新增菜单树' : '编辑菜单树'">菜单树表单</h2>
            <a th:href="@{/menu-tree/list}" class="btn btn-secondary">返回列表</a>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}">操作失败</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <form th:action="@{/menu-tree/save}" method="post" th:object="${menuTree}">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="mb-3">
                        <label for="treeCode" class="form-label">菜单树编码 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="treeCode" th:field="*{treeCode}" 
                               th:readonly="${menuTree.id != null}" required>
                        <div class="form-text">菜单树编码创建后不可修改</div>
                    </div>

                    <div class="mb-3">
                        <label for="treeName" class="form-label">菜单树名称 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="treeName" th:field="*{treeName}" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">描述</label>
                        <textarea class="form-control" id="description" rows="3" th:field="*{description}"></textarea>
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">状态</label>
                        <select class="form-select" id="status" th:field="*{status}">
                            <option value="1">启用</option>
                            <option value="0">禁用</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary">保存</button>
                    <a th:href="@{/menu-tree/list}" class="btn btn-secondary">取消</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
