<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head('菜单管理 - 专业管理系统')"></head>
<body>
    <div th:replace="layout :: sidebar('menu')"></div>
    <div class="main-content">
        <div class="page-header d-flex justify-content-between align-items-center">
            <h2>菜单管理</h2>
            <a th:href="@{/menu/add(treeId=${selectedTreeId})}" th:if="${selectedTreeId != null}" class="btn btn-primary">新增菜单</a>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}">操作成功</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}">操作失败</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <form th:action="@{/menu/list}" method="get">
                    <div class="row align-items-end">
                        <div class="col-md-6">
                            <label for="treeId" class="form-label">选择菜单树</label>
                            <select class="form-select" id="treeId" name="treeId" onchange="this.form.submit()">
                                <option value="">请选择菜单树</option>
                                <option th:each="menuTree : ${menuTrees}" 
                                        th:value="${menuTree.id}" 
                                        th:text="${menuTree.treeName}"
                                        th:selected="${menuTree.id == selectedTreeId}">主导航菜单</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="card" th:if="${selectedTreeId != null}">
            <div class="card-header">
                <h5 th:text="'菜单树: ' + ${selectedTree.treeName}">菜单树</h5>
            </div>
            <div class="card-body">
                <div th:if="${#lists.isEmpty(menuTree)}" class="text-center text-muted py-4">
                    暂无菜单数据
                </div>
                <ul th:if="${not #lists.isEmpty(menuTree)}" class="list-group">
                    <th:block th:each="menu : ${menuTree}">
                        <li th:insert="~{menu/menu-item :: menuItem(menu=${menu}, level=0)}"></li>
                    </th:block>
                </ul>
            </div>
        </div>

        <div class="card" th:if="${selectedTreeId == null}">
            <div class="card-body text-center text-muted py-4">
                请先选择一个菜单树
            </div>
        </div>
    </div>
</body>
</html>
